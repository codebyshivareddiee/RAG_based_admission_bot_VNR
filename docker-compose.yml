version: "3.9"

services:
  chatbot:
    build: .
    container_name: vnrvjiet-admissions-chatbot
    ports:
      - "${PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      HOST: ${HOST}
      PORT: ${APP_PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${APP_PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
